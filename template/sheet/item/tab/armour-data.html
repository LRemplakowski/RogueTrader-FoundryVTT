<div class="stats border">
    <h1>{{localize "TITLE.STATS"}}</h1>
    <div class="stats-row">
        <div class="stat type">
            <label>{{localize "ARMOUR.TYPE"}}</label>
            <select name="system.type">
                {{{selectOptions options.armourTypeOptions selected=system.type}}}
            </select>
        </div> 
        <div class="stat part">
                        <label>{{localize "ARMOUR.IS_ADDITIVE"}}</label>
                        <input name="system.isAdditive" type="checkbox" {{checked system.isAdditive}} />
        </div>					
        <div class="stat max-agility">
            <label>{{localize "ARMOUR.MAX_AGILITY"}}</label>
            <input name="system.maxAgility" type="number" value="{{system.maxAgility}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats-row" style="justify-content: space-evenly">
        <div class="stat part">
            <label>{{localize "ARMOUR.LEFT_ARM"}}</label>
            <input name="system.part.leftArm" type="number" value="{{system.part.leftArm}}" data-dtype="Number" />
        </div>
        <div class="stat part">
            <label>{{localize "ARMOUR.HEAD"}}</label>
            <input name="system.part.head" type="number" value="{{system.part.head}}" data-dtype="Number" />
        </div>
        <div class="stat part">
            <label>{{localize "ARMOUR.RIGHT_ARM"}}</label>
            <input name="system.part.rightArm" type="number" value="{{system.part.rightArm}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats-row" style="justify-content: space-evenly">
        <div class="stat part">
            <label>{{localize "ARMOUR.LEFT_LEG"}}</label>
            <input name="system.part.leftLeg" type="number" value="{{system.part.leftLeg}}" data-dtype="Number" />
        </div>
        <div class="stat part">
            <label>{{localize "ARMOUR.BODY"}}</label>
            <input name="system.part.body" type="number" value="{{system.part.body}}" data-dtype="Number" />
        </div>
        <div class="stat part">
            <label>{{localize "ARMOUR.RIGHT_LEG"}}</label>
            <input name="system.part.rightLeg" type="number" value="{{system.part.rightLeg}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats-row">
        <div class="stat craftsmanship">
            <label>{{localize "ARMOUR.CRAFTSMANSHIP"}}</label>
            <select name="system.craftsmanship">
                {{{selectOptions options.craftsmanshipOptions selected=system.craftsmanship}}}
            </select>
        </div>
        <div class="stat availability">
            <label>{{localize "ARMOUR.AVAILABILITY"}}</label>
            <select name="system.availability">
                {{{selectOptions options.availabilityOptions selected=system.availability}}}
            </select>
        </div>
        <div class="stat weight">
            <label>{{localize "ARMOUR.WEIGHT"}}</label>
            <input name="system.weight" type="number" value="{{system.weight}}" data-dtype="Number" />
        </div>
    </div>
</div>
