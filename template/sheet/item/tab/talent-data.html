<div class="stats border">
    <h1>{{localize "TITLE.STATS"}}</h1>
    <div class="stats-row">
        <div class="stat prerequisites">
            <label>{{localize "TALENT.PREREQUISITES"}}</label>
            <input name="system.prerequisites" type="text" value="{{system.prerequisites}}" />
        </div>
        <div class="stat tier">
            <label>{{localize "TALENT.TIER"}}</label>
            <input name="system.tier" type="number" value="{{system.tier}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats-row">
        <div class="stat aptitudes">
            <label>{{localize "TALENT.APTITUDES"}}</label>
            <input name="system.aptitudes" type="text" value="{{system.aptitudes}}" />
        </div>
    </div>
    <div class="stats-row">
        <div class="stat benefit">
            <label>{{localize "TALENT.BENEFIT"}}</label>
            <input name="system.benefit" type="text" value="{{system.benefit}}" />
        </div>
    </div>
</div>
