<div class="stats border">
    <h1>{{localize "TITLE.STATS"}}</h1>
    <div class="stats-row" style="justify-content: space-evenly">
        <div class="stat protection-rating">
            <label>{{localize "FORCE_FIELD.PROTECTION_RATING"}}</label>
            <input name="system.protectionRating" type="text" value="{{system.protectionRating}}" data-dtype="Number" />
        </div>
        <div class="stat overload-chance">
            <label>{{localize "FORCE_FIELD.OVERLOAD_CHANCE"}}</label>
            <input name="system.overloadChance" type="number" value="{{system.overloadChance}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats-row">
        <div class="stat craftsmanship">
            <label>{{localize "FORCE_FIELD.CRAFTSMANSHIP"}}</label>
            <select name="system.craftsmanship">
                {{{selectOptions options.craftsmanshipOptions selected=system.craftsmanship}}}
            </select>
        </div>
        <div class="stat availability">
            <label>{{localize "FORCE_FIELD.AVAILABILITY"}}</label>
            <select name="system.availability">
                {{{selectOptions options.availabilityOptions selected=system.availability}}}
            </select>
        </div>
        <div class="stat weight">
            <label>{{localize "FORCE_FIELD.WEIGHT"}}</label>
            <input name="system.weight" type="number" value="{{system.weight}}" data-dtype="Number" />
        </div>
    </div>
</div>
