<form class="item-form colony-upgrade-item" autocomplete="off">
    <div class="header border">
        <div class="flex row">
            <div class="avatar">
                <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
            </div>
            <div class="flex column grow justify-center">
                <div class="name header-row">
                    <label>{{localize "TOOL.NAME"}}</label>
                    <input name="name" type="text" value="{{item.name}}" />
                </div>
            </div>
        </div>
    </div>

    <div class="sheet-tabs tabs flex row" data-group="primary">
        <b class="item" data-tab="data">{{localize "TAB.DATA"}}</b>
        <b class="item" data-tab="notes">{{localize "TAB.NOTES"}}</b>
    </div>

    <div class="sheet-body">
        <div class="tab" data-group="primary" data-tab="data">
            <div class="stats border">
                <h1>{{localize "TITLE.STATS"}}</h1>
                <div class="stats-row">
                    <div class="stat prerequisites">
                        <label>{{localize "TALENT.PREREQUISITES"}}</label>
                        <input name="system.prerequisites" type="text" value="{{system.prerequisites}}" />
                    </div>
                    <div class="stat flex row item-align-center">
                        <label for="toggle">Use Slot</label>
                        <input type="checkbox" id="toggle" name="system.usesUpgradeSlot" {{#if system.usesUpgradeSlot}}checked{{/if}}>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat availability">
                        <label>{{localize "TOOL.AVAILABILITY"}}</label>
                        <select name="system.availability">
                            {{{selectOptions options.availabilityOptions selected=system.availability}}}
                        </select>
                    </div>
                    <div class="stat bonus-slots">
                        <label>{{localize "COLONY_UPGRADE.BONUS_SLOTS"}}</label>
                        <input class="number" name="system.bonusSlots" type="number" value="{{system.bonusSlots}}" data-dtype="Number" />
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat loyalty">
                        <label>{{localize "COLONY_UPGRADE.LOYALTY"}}</label>
                        <input class="number" name="system.yearlyLoyalty" type="number" value="{{system.yearlyLoyalty}}" data-dtype="Number" />
                    </div>
                    <div class="stat prosperity">
                        <label>{{localize "COLONY_UPGRADE.PROSPERITY"}}</label>
                        <input class="number" name="system.yearlyProsperity" type="number" value="{{system.yearlyProsperity}}" data-dtype="Number" />
                    </div>
                    <div class="stat security">
                        <label>{{localize "COLONY_UPGRADE.SECURITY"}}</label>
                        <input class="number" name="system.yearlySecurity" type="number" value="{{system.yearlySecurity}}" data-dtype="Number" />
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat short-description">
                        <label>{{localize "WEAPON.SPECIAL"}}</label>
                        <input name="system.special" type="text" value="{{system.special}}" />
                    </div>
                </div>
            </div>
        </div>
        <div class="tab" data-group="primary" data-tab="notes">
            <div class="notes-editor border">
                <h1>{{localize "TITLE.NOTES"}}</h1>
                <div style="height: 100%; width: 100%">
                    {{editor item.descriptionHTML target="system.description" engine="prosemirror" button=true editable=true}}
                </div>
            </div>
        </div>
    </div>

</form>
