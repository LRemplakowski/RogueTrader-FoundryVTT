<section class="{{cssClass}}" autocomplete="off">
    <div class="explorer">
        {{log this}}
        <div class="header border">
            <div class="flex row">
                <div class="avatar">
                    <img class="profile-img" src="{{actor.img}}" data-action="editImage" data-edit="img" title="{{actor.name}}" />
                </div>
                <div class="flex column grow">
                    <div class="name header-row">
                        <label>{{localize "BIO.NAME"}}</label>
                        <input name="name" type="text" value="{{actor.name}}" />
                    </div>
                    <div class="header-row">
                        <div class="career">
                            <label>{{localize "BIO.CAREER"}}</label>
                            <input style="margin-left: 43px" name="system.bio.career" type="text" value="{{system.bio.career}}" />
                        </div>
                        <div class="rank">
                            <label>{{localize "BIO.RANK"}}</label>
                            <input style="margin-left: 35px" name="system.bio.rank" type="text" value="{{system.bio.rank}}" disabled />
                        </div>
                        <div class="fate">
                            <label>{{localize "FATE"}}</label>
                            <input style="margin-left: 20px" name="system.fate.value" type="number" value="{{system.fate.value}}" data-dtype="Number" />
                            /
                            <input name="system.fate.max" type="number" value="{{system.fate.max}}" data-dtype="Number" />
                        </div>
                    </div>
                    <div class="header-row">
                        <div class="home-world">
                            <label>{{localize "BIO.HOME_WORLD"}}</label>
                            <input name="system.bio.homeWorld" type="text" value="{{system.bio.homeWorld}}" />
                        </div>
                        <div class="motivation">
                            <label>{{localize "BIO.MOTIVATION"}}</label>
                            <input name="system.bio.motivation" type="text" value="{{system.bio.motivation}}" />
                        </div>
                        <div class="fatigue">
                            <label>{{localize "FATIGUE"}}</label>
                            <input name="system.fatigue.value" type="number" value="{{system.fatigue.value}}" data-dtype="Number" />
                            /
                            <input name="system.fatigue.max" type="number" value="{{system.fatigue.max}}" data-dtype="Number" disabled />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- v13 MIGRATION: V2 Tab System - Tab Navigation -->
        <nav class="sheet-tabs tabs flex row" data-group="primary">
            {{#each tabs as |tab tabId|}}
                <button 
                    class="item tab-button {{#if tab.active}}active{{/if}}"
                    data-action="tab"
                    data-tab="{{tab.id}}"
                    data-group="{{tab.group}}"
                    type="button"
                    form=""
                >
                    {{localize tab.label}}
                </button>
            {{/each}}
        </nav>

        <!-- v13 MIGRATION: V2 Tab System - Tab Content Container -->
        <div class="tab-body">
            {{#each tabs as |tab tabId|}}
                <section 
                    class="tab {{tab.cssClass}} {{#if tab.active}}active{{/if}}"
                    data-tab="{{tab.id}}"
                    data-group="{{tab.group}}"
                    {{#if tab.active}}aria-selected="true"{{/if}}
                >
                    {{> (lookup tab "partial") ..}}
                </section>
            {{/each}}
        </div>
    </div>
</section>
