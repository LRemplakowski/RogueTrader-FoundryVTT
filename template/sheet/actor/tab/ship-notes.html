<div class="tab">
    <div class="notes-editor border">
        <h1>{{localize "TITLE.NOTES"}}</h1>
        <div style="height: 100%; width: 100%">
            {{#if editable}}
                <prose-mirror
                    name="system.bio.notes"
                    value="{{system.bio.notes}}"
                    data-document-uuid="{{actor.uuid}}"
                    toggled>
                    {{{ notesHTML }}}
                </prose-mirror>
            {{else}}
                {{{ notesHTML }}}
            {{/if}}
        </div>
    </div>
</div>
