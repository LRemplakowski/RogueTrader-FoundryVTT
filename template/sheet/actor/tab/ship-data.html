<div class="flex wrap column border stats-content">
    <h1>{{localize "TITLE.STATS"}}</h1>
    <div class="stats row">
        <div class="stat speed">
            <label>Speed</label>
            <input name="system.engineering.speed" type="number" value="{{system.engineering.speed}}" data-dtype="Number"/>
        </div>
        <div class="stat maneuverability">
            <label>Manoeuvrability</label>
            <input name="system.engineering.maneuverability" type="number" value="{{system.engineering.maneuverability}}" data-dtype="Number" />
        </div>
        <div class="stat detection">
            <label>Detection</label>
            <input name="system.engineering.detection" type="number" value="{{system.engineering.detection}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats row">
        <div class="stat turretRating">
            <label>Turret Rating</label>
            <input name="system.engineering.turretRating" type="number" value="{{system.engineering.turretRating}}" data-dtype="Number" />
        </div>
        <div class="stat shields">
            <label>Shields</label>
            <input name="system.engineering.shields" type="number" value="{{system.engineering.shields}}" data-dtype="Number" />
        </div>
        <div class="stat armour">
            <label>Armour</label>
            <input name="system.engineering.armour" type="number" value="{{system.engineering.armour}}" data-dtype="Number" />
        </div>
    </div>
    <div class="stats row">
        <div class="stat hullIntegrity">
            <label>Hull Integrity: Current</label>
            <input name="system.hull.integrity.value" type="number" value="{{system.hull.integrity.value}}" data-dtype="Number" />
        </div>
        <div class="stat hullIntegrity">
            <label>Hull Integrity: Max</label>
            <input name="system.hull.integrity.max" type="number" value="{{system.hull.integrity.max}}" data-dtype="Number" /> 
        </div>
    </div>
    <div class="stats row">
        <div class="stat crewCount">
            <label>Crew Count: Current</label>
            <input name="system.crew.count.value" type="number" value="{{system.crew.count.value}}" data-dtype="Number" />
        </div>
        <div class="stat crewCount">
            <label>Crew Count: Max</label>
            <input name="system.crew.count.max" type="number" value="{{system.crew.count.max}}" data-dtype="Number" /> 
        </div>
    </div>
    <div class="stats row">
        <div class="stat crewMorale">
            <label>Crew Morale: Current</label>
            <input name="system.crew.morale.value" type="number" value="{{system.crew.morale.value}}" data-dtype="Number" />
        </div>
        <div class="stat crewCount">
            <label>Crew Morale: Max</label>
            <input name="system.crew.morale.max" type="number" value="{{system.crew.morale.max}}" data-dtype="Number" /> 
        </div>
    </div>
    <div class="stats row">
        <div class="stat space">
            <label>Space: Total</label>
            <input name="system.engineering.space.max" type="number" value="{{system.engineering.space.max}}" data-dtype="Number" /> 
        </div>
        <div class="stat space">
            <label>Space: Used</label>
            <input name="system.engineering.space.value" type="number" value="{{system.engineering.space.value}}" data-dtype="Number" disabled />
        </div>
        <div class="stat space">
            <label>Space: Available</label>
            <input name="system.engineering.space.avail" type="number" value="{{system.engineering.space.avail}}" data-dtype="Number" disabled /> 
        </div>
    </div>
    <div class="stats row">
        <div class="stat power">
            <label>Power: Total</label>
            <input name="system.engineering.power.max" type="number" value="{{system.engineering.power.max}}" data-dtype="Number" disabled/> 
        </div>
        <div class="stat power">
            <label>Power: Used</label>
            <input name="system.engineering.power.value" type="number" value="{{system.engineering.power.value}}" data-dtype="Number" disabled />
        </div>
        <div class="stat power">
            <label>Power: Available</label>
            <input name="system.engineering.power.avail" type="number" value="{{system.engineering.power.avail}}" data-dtype="Number" disabled /> 
        </div>
    </div>
    <div class="stats row">
        <div class="stat points">
            <label>Points: Hull</label>
            <input name="system.engineering.points.base" type="number" value="{{system.engineering.points.base}}" data-dtype="Number" /> 
        </div>
        <div class="stat points">
            <label>Points: Components</label>
            <input name="system.engineering.points.components" type="number" value="{{system.engineering.points.components}}" data-dtype="Number" disabled />
        </div>
        <div class="stat points">
            <label>Points: Total</label>
            <input name="system.engineering.points.total" type="number" value="{{system.engineering.points.total}}" data-dtype="Number" disabled /> 
        </div>
    </div>
</div>
