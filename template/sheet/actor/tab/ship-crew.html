<div class="tab">
    <div class="stats border">
        <div class="stats flex border">
            <div class="stats flex row">
                <div class="stat crewSkill">
                    <div class="flex row crew-skill-label">
                        <label>{{localize "SHIP.CREW_SKILL"}}</label>
                        <button class="button roll-icon" data-action="rollCrewSkill" title="{{localize 'SHIP.ROLL_CREW_SKILL'}}">
                            <img src="icons/svg/d10-grey.svg"/>
                        </button>
                    </div>
                    <select name="system.crew.skill">
                        {{{selectOptions options.crewSkillOptions selected=system.crew.skill}}}
                    </select>
                </div>
            </div>
        </div>
        <h1>{{localize "TITLE.CREW_RANK_ONE"}}</h1>

            <div class="crew flex column">
                <div class="stat border crew-rank1" data-crewRole="captain">
                    <div class="avatar" data-crewRole="captain">
                        <img class="crew-img-captain" src="{{system.crew.namedCrew.lordCaptain.img}}" title="{{system.crew.namedCrew.lordCaptain.name}}" data-crewRole="captain">
                        <div class="button remove-crew-btn" data-action="remoweCrewMember" data-crewRole="captain">
                            <a class="crew-control" data-action="remoweCrewMember" data-crewRole="captain"><i class="fas fa-trash"></i></a>
                        </div>
                    </div>
                    <label>{{localize "SHIP.NAMED_CREW.LORD_CAPTAIN"}}</label>
                </div>
            </div>
        </div>
