<section class="{{cssClass}}" autocomplete="off">
    <div class="npc">
        <div class="header border">
            <div class="flex row">
                <div class="avatar">
                    <img class="profile-img" src="{{actor.img}}" data-action="editImage" data-edit="img" title="{{actor.name}}" />
                </div>
                <div class="flex column grow">
                    <div class="name header-row">
                        <label>{{localize "BIO.NAME"}}</label>
                        <input name="name" type="text" value="{{actor.name}}" />
                    </div>
                    <div class="header-row" style="height: 22px">
                        <div class="type">
                            <label>{{localize "BIO.TYPE"}}</label>
                            <select name="system.type" style="margin-left: 22px">
                                {{{selectOptions options.npcTypeOptions selected=system.type}}}
                            </select>
                        </div>
                        <div class="threat-level">
                            <label>{{localize "BIO.THREAT_LEVEL"}}</label>
                            <input style="margin-left: 8px" name="system.threatLevel" type="number" value="{{system.threatLevel}}" data-dtype="Number" />
                        </div>
                        <div class="fate">
                            <label>{{localize "FATE"}}</label>
                            <input style="margin-left: 20px" name="system.fate.value" type="number" value="{{system.fate.value}}" data-dtype="Number" />
                            /
                            <input name="system.fate.max" type="number" value="{{system.fate.max}}" data-dtype="Number" />
                        </div>
                    </div>
                    <div class="header-row">
                        <div class="faction">
                            <label>{{localize "BIO.FACTION"}}</label>
                            <input style="margin-left: 10px" name="system.faction" type="text" value="{{system.faction}}" />
                        </div>
                        <div class="subfaction">
                            <label>{{localize "BIO.SUBFACTION"}}</label>
                            <input style="margin-left: 17px" name="system.subfaction" type="text" value="{{system.subfaction}}" />
                        </div>
                        <div class="fatigue">
                            <label>{{localize "FATIGUE"}}</label>
                            <input name="system.fatigue.value" type="number" value="{{system.fatigue.value}}" data-dtype="Number" />
                            /
                            <input name="system.fatigue.max" type="number" value="{{system.fatigue.max}}" data-dtype="Number" disabled />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- v13 MIGRATION: V2 Tab System - Tab Navigation -->
        <nav class="sheet-tabs tabs" data-group="primary">
            {{#each tabs as |tab tabId|}}
                <button 
                    class="item tab-button {{#if tab.active}}active{{/if}}"
                    data-action="tab"
                    data-tab="{{tab.id}}"
                    data-group="{{tab.group}}"
                    type="button"
                >
                    {{localize tab.label}}
                </button>
            {{/each}}
        </nav>

        <!-- v13 MIGRATION: V2 Tab System - Tab Content Container -->
        <div class="sheet-body tab-body">
            {{#each tabs as |tab|}}
                <section 
                    class="tab {{tab.cssClass}} {{#if tab.active}}active{{/if}}"
                    data-tab="{{tab.id}}"
                    data-group="{{tab.group}}"
                    {{#if tab.active}}aria-selected="true"{{/if}}
                >
                    {{> (lookup tab "partial") ..}}
                </section>
            {{/each}}
        </div>
    </div>
</section>
